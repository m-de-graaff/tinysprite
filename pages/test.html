<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TinySprites Test Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d0f13;
            color: #e8eaf3;
            line-height: 1.6;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        h1 {
            color: #78dcfa;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        
        .section {
            background: #141824;
            border: 1px solid #22283a;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        h2 {
            color: #78dcfa;
            margin-bottom: 15px;
            border-bottom: 2px solid #22283a;
            padding-bottom: 8px;
        }
        
        .test-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 20px 0;
        }
        
        .test-item {
            background: #0b0e17;
            border: 1px solid #1f2538;
            border-radius: 8px;
            padding: 15px;
        }
        
        .test-item h3 {
            color: #78dcfa;
            margin-bottom: 10px;
        }
        
        .canvas-container {
            text-align: center;
            margin: 15px 0;
        }
        
        canvas {
            border: 2px solid #22283a;
            border-radius: 8px;
            background: #0f1422;
            max-width: 100%;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin: 15px 0;
        }
        
        .info-item {
            background: #0a0f1b;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #1f2538;
        }
        
        .info-label {
            color: #9aa3b2;
            font-size: 0.8em;
            margin-bottom: 3px;
        }
        
        .info-value {
            font-size: 1em;
            font-weight: 600;
            color: #78dcfa;
        }
        
        .palette {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 15px 0;
        }
        
        .color-swatch {
            width: 25px;
            height: 25px;
            border: 2px solid #1e2436;
            border-radius: 4px;
            position: relative;
        }
        
        .color-swatch.transparent {
            background: conic-gradient(#1a2032 0 25%, #141a29 0 50%, #1a2032 0 75%, #141a29 0) 0 0/6px 6px;
        }
        
        .color-swatch::after {
            content: attr(data-index);
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 9px;
            color: #8b9bb4;
            background: rgba(139, 155, 180, 0.1);
            padding: 1px 3px;
            border-radius: 2px;
            white-space: nowrap;
        }
        
        .status {
            padding: 10px;
            border-radius: 6px;
            margin: 10px 0;
            font-weight: 500;
        }
        
        .status.success {
            background: rgba(45, 212, 191, 0.1);
            border: 1px solid rgba(45, 212, 191, 0.3);
            color: #2dd4bf;
        }
        
        .status.error {
            background: rgba(255, 91, 107, 0.1);
            border: 1px solid rgba(255, 91, 107, 0.3);
            color: #ff5b6b;
        }
        
        .status.info {
            background: rgba(120, 220, 250, 0.1);
            border: 1px solid rgba(120, 220, 250, 0.3);
            color: #78dcfa;
        }
        
        .code-display {
            background: #0a0f1b;
            border: 1px solid #1f2538;
            border-radius: 6px;
            padding: 15px;
            font-family: monospace;
            word-break: break-all;
            margin: 10px 0;
            font-size: 12px;
            line-height: 1.4;
        }
        
        .button {
            background: #78dcfa;
            color: #0d0f13;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            margin: 5px;
        }
        
        .button:hover {
            background: #5bc0de;
        }
        
        .button.secondary {
            background: #6c757d;
        }
        
        .button.secondary:hover {
            background: #5a6268;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 TinySprites Test Page</h1>
        
        <div class="section">
            <h2>📋 Test Configuration</h2>
            <div class="info-grid">
                <div class="info-item">
                    <div class="info-label">Packed String</div>
                    <div class="info-value">Custom Test String</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Default Width</div>
                    <div class="info-value" id="currentWidth">13</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Default Height</div>
                    <div class="info-value" id="currentHeight">9</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Expected Pixels</div>
                    <div class="info-value" id="expectedPixels">117</div>
                </div>
            </div>
            
            <div class="code-display">
                <label for="testStringInput"><strong>Packed String:</strong></label>
                <input id="testStringInput" style="width: 100%; margin-top: 8px; font-family: ui-monospace, Menlo, Consolas, monospace;" />
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;">
                    <div>
                        <label for="tileWidthInput"><strong>Tile Width:</strong></label>
                        <input id="tileWidthInput" type="number" min="1" max="100" value="13" style="width: 100%; margin-top: 4px; font-family: ui-monospace, Menlo, Consolas, monospace;" />
                    </div>
                    <div>
                        <label for="tileHeightInput"><strong>Tile Height:</strong></label>
                        <input id="tileHeightInput" type="number" min="1" max="100" value="9" style="width: 100%; margin-top: 4px; font-family: ui-monospace, Menlo, Consolas, monospace;" />
                    </div>
                </div>
            </div>
            
            <div style="text-align: center; margin: 20px 0;">
                <button class="button" onclick="runAllTests()">🧪 Run All Tests</button>
                <button class="button secondary" onclick="clearAll()">🗑️ Clear All</button>
            </div>
        </div>
        
        <div class="test-grid">
            <div class="test-item">
                <h3>🎨 Basic Decode & Display</h3>
                <div class="canvas-container">
                    <canvas id="basicCanvas" width="260" height="180"></canvas>
                </div>
                <div id="basicInfo"></div>
                <div id="basicStatus"></div>
            </div>
            
            <div class="test-item">
                <h3>🔍 Detailed Sprite Analysis</h3>
                <div id="detailedInfo"></div>
                <div id="detailedStatus"></div>
            </div>
            
            <div class="test-item">
                <h3>📐 Multiple Scales</h3>
                <div class="canvas-container">
                    <canvas id="scaleCanvas" width="260" height="180"></canvas>
                </div>
                <div id="scaleInfo"></div>
                <div id="scaleStatus"></div>
            </div>
            
            <div class="test-item">
                <h3>🎯 ImageData Test</h3>
                <div class="canvas-container">
                    <canvas id="imageDataCanvas" width="260" height="180"></canvas>
                </div>
                <div id="imageDataInfo"></div>
                <div id="imageDataStatus"></div>
            </div>
            
            <div class="test-item">
                <h3>🖼️ Canvas Generation</h3>
                <div class="canvas-container">
                    <canvas id="generatedCanvas" width="260" height="180"></canvas>
                </div>
                <div id="generatedInfo"></div>
                <div id="generatedStatus"></div>
            </div>
            
            <div class="test-item">
                <h3>📊 Raw Data Analysis</h3>
                <div id="rawDataInfo"></div>
                <div id="rawDataStatus"></div>
            </div>
        </div>
        
        <div class="section">
            <h2>📊 Test Results Summary</h2>
            <div id="testSummary"></div>
        </div>
    </div>

    <script src="../tinysprites.js"></script>
    <script>
        const DEFAULT_TEST_STRING = "|1f00!AQACEAADAQEBEBAQ"
        
        let TEST_STRING = DEFAULT_TEST_STRING;
        let TEST_WIDTH = 13;
        let TEST_HEIGHT = 9;
        let testResults = {};
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            console.log('🧪 TinySprites Test Page Initialized');
            document.getElementById('testStringInput').value = DEFAULT_TEST_STRING;
            TEST_STRING = document.getElementById('testStringInput').value;
            
            // Set initial dimensions
            TEST_WIDTH = parseInt(document.getElementById('tileWidthInput').value);
            TEST_HEIGHT = parseInt(document.getElementById('tileHeightInput').value);
            
            console.log('Test string:', TEST_STRING);
            console.log('Test dimensions:', TEST_WIDTH, 'x', TEST_HEIGHT);
            
            // Set default dimensions
            TinySprites.defaultW = TEST_WIDTH;
            TinySprites.defaultH = TEST_HEIGHT;
            
            console.log('Default dimensions set to:', TinySprites.defaultW, 'x', TinySprites.defaultH);
            
            // Add event listeners for dynamic updates
            document.getElementById('tileWidthInput').addEventListener('input', updateDisplayValues);
            document.getElementById('tileHeightInput').addEventListener('input', updateDisplayValues);
            
            // Update display initially
            updateDisplayValues();
        });
        
        function updateDisplayValues() {
            const width = parseInt(document.getElementById('tileWidthInput').value) || 0;
            const height = parseInt(document.getElementById('tileHeightInput').value) || 0;
            
            document.getElementById('currentWidth').textContent = width;
            document.getElementById('currentHeight').textContent = height;
            document.getElementById('expectedPixels').textContent = width * height;
        }
        
        function runAllTests() {
            console.log('🧪 Running all tests...');
            testResults = {};
            TEST_STRING = document.getElementById('testStringInput').value;
            TEST_WIDTH = parseInt(document.getElementById('tileWidthInput').value);
            TEST_HEIGHT = parseInt(document.getElementById('tileHeightInput').value);
            
            console.log('Using test string:', TEST_STRING);
            console.log('Using dimensions:', TEST_WIDTH, 'x', TEST_HEIGHT);
            
            // Update TinySprites defaults
            TinySprites.defaultW = TEST_WIDTH;
            TinySprites.defaultH = TEST_HEIGHT;
            
            try {
                testBasicDecode();
                testDetailedAnalysis();
                testMultipleScales();
                testImageData();
                testCanvasGeneration();
                testRawData();
                
                updateTestSummary();
                showStatus('All tests completed!', 'success');
            } catch (error) {
                console.error('❌ Test suite error:', error);
                showStatus('Test suite failed: ' + error.message, 'error');
            }
        }
        
        function testBasicDecode() {
            console.log('🧪 Testing basic decode...');
            const testName = 'basicDecode';
            
            try {
                const sprite = TinySprites.decodePacked(TEST_STRING);
                console.log('Decoded sprite:', sprite);
                
                // Validate sprite
                if (!sprite.w || !sprite.h || sprite.w <= 0 || sprite.h <= 0) {
                    throw new Error(`Invalid dimensions: ${sprite.w} x ${sprite.h}`);
                }
                
                if (!sprite.data || sprite.data.length !== sprite.w * sprite.h) {
                    throw new Error(`Data length mismatch: expected ${sprite.w * sprite.h}, got ${sprite.data?.length || 0}`);
                }
                
                // Display on canvas
                const canvas = document.getElementById('basicCanvas');
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                TinySprites.draw(ctx, sprite, 0, 0, { scale: 20 });
                
                // Update info
                document.getElementById('basicInfo').innerHTML = `
                    <div class="info-grid">
                        <div class="info-item">
                            <div class="info-label">Dimensions</div>
                            <div class="info-value">${sprite.w} × ${sprite.h}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Data Length</div>
                            <div class="info-value">${sprite.data.length}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Palette Size</div>
                            <div class="info-value">${sprite.palette.length}</div>
                        </div>
                    </div>
                `;
                
                testResults[testName] = { success: true, sprite };
                showStatus('Basic decode test passed!', 'success', 'basicStatus');
                
            } catch (error) {
                console.error('❌ Basic decode test failed:', error);
                testResults[testName] = { success: false, error: error.message };
                showStatus('Basic decode test failed: ' + error.message, 'error', 'basicStatus');
            }
        }
        
        function testDetailedAnalysis() {
            console.log('🧪 Testing detailed analysis...');
            const testName = 'detailedAnalysis';
            
            try {
                const sprite = TinySprites.decodePacked(TEST_STRING);
                
                // Analyze palette
                let paletteInfo = '<div class="palette">';
                paletteInfo += '<div class="color-swatch transparent" data-index="T"></div>';
                
                for (let i = 1; i < sprite.palette.length; i++) {
                    const color = sprite.palette[i];
                    const hex = rgbToHex(color[0], color[1], color[2]);
                    paletteInfo += `<div class="color-swatch" style="background: ${hex}" data-index="${String.fromCharCode(64 + i)}"></div>`;
                }
                paletteInfo += '</div>';
                
                // Analyze data distribution
                const dataCounts = {};
                for (const idx of sprite.data) {
                    dataCounts[idx] = (dataCounts[idx] || 0) + 1;
                }
                
                let dataInfo = '<div class="info-grid">';
                for (const [idx, count] of Object.entries(dataCounts)) {
                    const label = idx === '0' ? 'T (Transparent)' : `${String.fromCharCode(64 + parseInt(idx))}`;
                    dataInfo += `
                        <div class="info-item">
                            <div class="info-label">${label}</div>
                            <div class="info-value">${count}</div>
                        </div>
                    `;
                }
                dataInfo += '</div>';
                
                document.getElementById('detailedInfo').innerHTML = `
                    <h4>Palette Analysis</h4>
                    ${paletteInfo}
                    <h4>Data Distribution</h4>
                    ${dataInfo}
                `;
                
                testResults[testName] = { success: true, sprite };
                showStatus('Detailed analysis test passed!', 'success', 'detailedStatus');
                
            } catch (error) {
                console.error('❌ Detailed analysis test failed:', error);
                testResults[testName] = { success: false, error: error.message };
                showStatus('Detailed analysis test failed: ' + error.message, 'error', 'detailedStatus');
            }
        }
        
        function testMultipleScales() {
            console.log('🧪 Testing multiple scales...');
            const testName = 'multipleScales';
            
            try {
                const sprite = TinySprites.decodePacked(TEST_STRING);
                const canvas = document.getElementById('scaleCanvas');
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // Draw at different scales
                const scales = [1, 2, 4, 8];
                let x = 0;
                
                for (const scale of scales) {
                    try {
                        TinySprites.draw(ctx, sprite, x, 0, { scale });
                        x += sprite.w * scale + 10;
                    } catch (err) {
                        console.warn(`Scale ${scale} failed:`, err);
                    }
                }
                
                document.getElementById('scaleInfo').innerHTML = `
                    <div class="info-grid">
                        <div class="info-item">
                            <div class="info-label">Scales Tested</div>
                            <div class="info-value">1x, 2x, 4x, 8x</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Position</div>
                            <div class="info-value">x: ${x}</div>
                        </div>
                    </div>
                `;
                
                testResults[testName] = { success: true };
                showStatus('Multiple scales test passed!', 'success', 'scaleStatus');
                
            } catch (error) {
                console.error('❌ Multiple scales test failed:', error);
                testResults[testName] = { success: false, error: error.message };
                showStatus('Multiple scales test failed: ' + error.message, 'error', 'scaleStatus');
            }
        }
        
        function testImageData() {
            console.log('🧪 Testing ImageData...');
            const testName = 'imageData';
            
            try {
                const sprite = TinySprites.decodePacked(TEST_STRING);
                const imageData = TinySprites.toImageData(sprite);
                
                console.log('ImageData created:', imageData);
                console.log('ImageData dimensions:', imageData.width, 'x', imageData.height);
                console.log('ImageData data length:', imageData.data.length);
                
                // Display on canvas
                const canvas = document.getElementById('imageDataCanvas');
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                ctx.putImageData(imageData, 0, 0);
                
                document.getElementById('imageDataInfo').innerHTML = `
                    <div class="info-grid">
                        <div class="info-item">
                            <div class="info-label">ImageData Width</div>
                            <div class="info-value">${imageData.width}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">ImageData Height</div>
                            <div class="info-value">${imageData.height}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Data Length</div>
                            <div class="info-value">${imageData.data.length}</div>
                        </div>
                    </div>
                `;
                
                testResults[testName] = { success: true, imageData };
                showStatus('ImageData test passed!', 'success', 'imageDataStatus');
                
            } catch (error) {
                console.error('❌ ImageData test failed:', error);
                testResults[testName] = { success: false, error: error.message };
                showStatus('ImageData test failed: ' + error.message, 'error', 'imageDataStatus');
            }
        }
        
        function testCanvasGeneration() {
            console.log('🧪 Testing canvas generation...');
            const testName = 'canvasGeneration';
            
            try {
                const sprite = TinySprites.decodePacked(TEST_STRING);
                const generatedCanvas = TinySprites.toCanvas(sprite, 20);
                
                console.log('Generated canvas:', generatedCanvas);
                console.log('Canvas dimensions:', generatedCanvas.width, 'x', generatedCanvas.height);
                
                // Display on our canvas
                const canvas = document.getElementById('generatedCanvas');
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                ctx.drawImage(generatedCanvas, 0, 0);
                
                document.getElementById('generatedInfo').innerHTML = `
                    <div class="info-grid">
                        <div class="info-item">
                            <div class="info-label">Generated Width</div>
                            <div class="info-value">${generatedCanvas.width}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Generated Height</div>
                            <div class="info-value">${generatedCanvas.height}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Scale Used</div>
                            <div class="info-value">20x</div>
                        </div>
                    </div>
                `;
                
                testResults[testName] = { success: true, generatedCanvas };
                showStatus('Canvas generation test passed!', 'success', 'generatedStatus');
                
            } catch (error) {
                console.error('❌ Canvas generation test failed:', error);
                testResults[testName] = { success: false, error: error.message };
                showStatus('Canvas generation test failed: ' + error.message, 'error', 'generatedStatus');
            }
        }
        
        function testRawData() {
            console.log('🧪 Testing raw data analysis...');
            const testName = 'rawData';
            
            try {
                const sprite = TinySprites.decodePacked(TEST_STRING);
                
                // Show first few data values
                const previewData = sprite.data.slice(0, 20);
                const dataPreview = previewData.map((val, idx) => {
                    const label = val === 0 ? 'T' : String.fromCharCode(64 + val);
                    return `${idx}:${label}(${val})`;
                }).join(' ');
                
                document.getElementById('rawDataInfo').innerHTML = `
                    <div class="info-grid">
                        <div class="info-item">
                            <div class="info-label">Total Pixels</div>
                            <div class="info-value">${sprite.data.length}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Expected Pixels</div>
                            <div class="info-value">${sprite.w * sprite.h}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Data Valid</div>
                            <div class="info-value">${sprite.data.length === sprite.w * sprite.h ? '✓' : '✗'}</div>
                        </div>
                    </div>
                    <div class="code-display">
                        <strong>First 20 pixels:</strong> ${dataPreview}
                    </div>
                `;
                
                testResults[testName] = { success: true, sprite };
                showStatus('Raw data test passed!', 'success', 'rawDataStatus');
                
            } catch (error) {
                console.error('❌ Raw data test failed:', error);
                testResults[testName] = { success: false, error: error.message };
                showStatus('Raw data test failed: ' + error.message, 'error', 'rawDataStatus');
            }
        }
        
        function updateTestSummary() {
            const totalTests = Object.keys(testResults).length;
            const passedTests = Object.values(testResults).filter(r => r.success).length;
            const failedTests = totalTests - passedTests;
            
            let summaryHTML = `
                <div class="info-grid">
                    <div class="info-item">
                        <div class="info-label">Total Tests</div>
                        <div class="info-value">${totalTests}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Passed</div>
                        <div class="info-value" style="color: #2dd4bf;">${passedTests}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Failed</div>
                        <div class="info-value" style="color: #ff5b6b;">${failedTests}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Success Rate</div>
                        <div class="info-value">${Math.round((passedTests / totalTests) * 100)}%</div>
                    </div>
                </div>
            `;
            
            if (failedTests > 0) {
                summaryHTML += '<h4>Failed Tests:</h4>';
                for (const [testName, result] of Object.entries(testResults)) {
                    if (!result.success) {
                        summaryHTML += `<div class="status error">${testName}: ${result.error}</div>`;
                    }
                }
            }
            
            document.getElementById('testSummary').innerHTML = summaryHTML;
        }
        
        function clearAll() {
            // Clear all canvases
            const canvases = document.querySelectorAll('canvas');
            canvases.forEach(canvas => {
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            });
            
            // Clear all info displays
            const infoElements = document.querySelectorAll('[id$="Info"]');
            infoElements.forEach(el => el.innerHTML = '');
            
            // Clear all status displays
            const statusElements = document.querySelectorAll('[id$="Status"]');
            statusElements.forEach(el => el.innerHTML = '');
            
            // Clear test summary
            document.getElementById('testSummary').innerHTML = '';
            
            // Reset test results
            testResults = {};
            
            showStatus('All displays cleared!', 'info');
        }
        
        function showStatus(message, type, elementId = null) {
            const statusElement = elementId ? document.getElementById(elementId) : null;
            if (statusElement) {
                statusElement.innerHTML = `<div class="status ${type}">${message}</div>`;
            } else {
                // Show in main area
                const mainStatus = document.createElement('div');
                mainStatus.className = `status ${type}`;
                mainStatus.textContent = message;
                document.querySelector('.container').insertBefore(mainStatus, document.querySelector('.section'));
                
                setTimeout(() => {
                    mainStatus.remove();
                }, 5000);
            }
        }
        
        function rgbToHex(r, g, b) {
            return '#' + [r, g, b].map(x => {
                const hex = x.toString(16);
                return hex.length === 1 ? '0' + hex : hex;
            }).join('');
        }
    </script>
</body>
</html>
