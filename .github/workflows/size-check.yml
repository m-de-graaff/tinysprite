name: Size Check

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  size-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Calculate file sizes
        id: sizes
        run: |
          DECODER_SIZE=$(wc -c < dist/decoder.min.js)
          ENCODER_SIZE=$(wc -c < dist/encoder.min.js)
          TOTAL_SIZE=$((DECODER_SIZE + ENCODER_SIZE))

          echo "decoder_size=$DECODER_SIZE" >> $GITHUB_OUTPUT
          echo "encoder_size=$ENCODER_SIZE" >> $GITHUB_OUTPUT
          echo "total_size=$TOTAL_SIZE" >> $GITHUB_OUTPUT

          echo "📊 Size Analysis:"
          echo "Decoder: ${DECODER_SIZE} bytes"
          echo "Encoder: ${ENCODER_SIZE} bytes"
          echo "Total: ${TOTAL_SIZE} bytes"

      - name: Comment PR with size info
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            // Check if we already commented
            const existingComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('📊 Size Analysis')
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                comment_id: existingComment.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## 📊 Size Analysis for PR #${context.issue.number}
                
                ### Bundle Sizes
                - **Decoder**: ${context.steps.sizes.outputs.decoder_size} bytes
                - **Encoder**: ${context.steps.sizes.outputs.encoder_size} bytes
                - **Total**: ${context.steps.sizes.outputs.total_size} bytes
                
                ### Size Impact
                ${context.steps.sizes.outputs.total_size <= 20000 ? '✅ All within size budget (≤20KB)' : '⚠️ All exceed size budget (>20KB)'}
                ${context.steps.sizes.outputs.decoder_size <= 5000 ? '✅ Decoder within size budget (≤5KB)' : '⚠️ Decoder exceeds size budget (>5KB)'}
                
                ---
                *Auto-generated by GitHub Actions*`
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## 📊 Size Analysis for PR #${context.issue.number}
                
                ### Bundle Sizes
                - **Decoder**: ${context.steps.sizes.outputs.decoder_size} bytes
                - **Encoder**: ${context.steps.sizes.outputs.encoder_size} bytes
                - **Total**: ${context.steps.sizes.outputs.total_size} bytes
                
                ### Size Impact
                ${context.steps.sizes.outputs.total_size <= 20000 ? '✅ Within size budget (≤20KB)' : '⚠️ Exceeds size budget (>20KB)'}
                
                ---
                *Auto-generated by GitHub Actions*`
              });
            }
